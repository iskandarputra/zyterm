name: zyterm CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: linux / ${{ matrix.cc }} / ${{ matrix.sanitizer }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Linux-only by design: zyterm targets Linux serial surfaces
        # (termios2 custom baud, inotify, epoll, /sys/class/tty
        # VID/PID discovery) and we don't ship macOS binaries.
        cc: [gcc, clang]
        sanitizer: ["none", "asan-ubsan"]
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps with cache
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential socat clang-format clang cppcheck
          version: 1.0

      - name: Check formatting
        if: matrix.sanitizer == 'none' && matrix.cc == 'gcc'
        run: make format-check

      - name: Build (release)
        if: matrix.sanitizer == 'none'
        run: make

      - name: Build (asan+ubsan)
        if: matrix.sanitizer == 'asan-ubsan'
        run: |
          make clean
          CFLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer \
                  -Wall -Wextra -pedantic -std=gnu11 -D_GNU_SOURCE \
                  -Iinclude -Isrc" \
          LDFLAGS="-fsanitize=address,undefined" make

      - name: Smoke test
        run: |
          ./zyterm --version
          ./zyterm --help | head -20

      - name: Unit tests (release)
        if: matrix.sanitizer == 'none'
        run: make test

      - name: Unit tests (asan+ubsan)
        if: matrix.sanitizer == 'asan-ubsan'
        run: |
          CFLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer \
                  -Wall -Wextra -pedantic -std=gnu11 -D_GNU_SOURCE \
                  -Iinclude -Isrc" \
          LDFLAGS="-fsanitize=address,undefined" make test

      - name: cppcheck
        if: matrix.sanitizer == 'none' && matrix.cc == 'gcc'
        run: make lint || true

