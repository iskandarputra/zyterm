name: zyterm CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: linux / ${{ matrix.cc }} / ${{ matrix.sanitizer }}
    runs-on: ubuntu-latest
    # Cap each job to 15 minutes. Local clean+build+test is < 90s; a
    # 15-minute ceiling lets a slow hosted runner finish honestly but
    # catches the kind of hang (blocked stdin, wedged child, infinite
    # poll) we explicitly hunt for in tests.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Linux-only by design: zyterm targets Linux serial surfaces
        # (termios2 custom baud, inotify, epoll, /sys/class/tty
        # VID/PID discovery) and we don't ship macOS binaries.
        cc: [gcc, clang]
        sanitizer: ["none", "asan-ubsan"]
    env:
      CC: ${{ matrix.cc }}
      # Belt-and-braces: kill any subprocess that runs > 10 min so we
      # never burn the full job timeout on a wedged test.
      ZT_CI_STEP_TIMEOUT: 600
    steps:
      - uses: actions/checkout@v5
        timeout-minutes: 2

      - name: Install build deps
        timeout-minutes: 5
        # Inline apt-get rather than awalsh128/cache-apt-pkgs-action
        # because the latter still pulls actions/cache/restore@v4 +
        # actions/cache/save@v4 (Node 20, deprecation pending). The
        # uncached install is ~15s — acceptable on ubuntu-latest.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential socat clang-format clang cppcheck

      - name: Check formatting
        if: matrix.sanitizer == 'none' && matrix.cc == 'gcc'
        timeout-minutes: 2
        run: make format-check

      - name: Build (release)
        if: matrix.sanitizer == 'none'
        timeout-minutes: 5
        run: make

      - name: Build (asan+ubsan)
        if: matrix.sanitizer == 'asan-ubsan'
        timeout-minutes: 5
        run: |
          make clean
          CFLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer \
                  -Wall -Wextra -pedantic -std=gnu11 -D_GNU_SOURCE \
                  -Iinclude -Isrc" \
          LDFLAGS="-fsanitize=address,undefined" make

      - name: Smoke test
        timeout-minutes: 2
        run: |
          timeout 30 ./zyterm --version
          timeout 30 ./zyterm --help | head -20

      - name: Unit tests (release)
        if: matrix.sanitizer == 'none'
        timeout-minutes: 5
        run: timeout 240 make test

      - name: Unit tests (asan+ubsan)
        if: matrix.sanitizer == 'asan-ubsan'
        timeout-minutes: 8
        run: |
          CFLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer \
                  -Wall -Wextra -pedantic -std=gnu11 -D_GNU_SOURCE \
                  -Iinclude -Isrc" \
          LDFLAGS="-fsanitize=address,undefined" timeout 420 make test

      - name: cppcheck
        if: matrix.sanitizer == 'none' && matrix.cc == 'gcc'
        timeout-minutes: 3
        run: make lint || true

